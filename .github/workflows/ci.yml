name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Valida que não há imports de arquivos com case errado.
      # CI roda em Linux (case-sensitive) — garante paridade com prod.
      - name: Check file name casing
        run: |
          CONFLICTS=$(find apps packages -type f -name "*.ts" -o -name "*.tsx" | \
            sort -f | uniq -di)
          if [ -n "$CONFLICTS" ]; then
            echo "Conflito de case em nomes de arquivo:"
            echo "$CONFLICTS"
            exit 1
          fi
